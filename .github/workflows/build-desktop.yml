name: Build Desktop Apps

# Builds native Ibra OS desktop installers for macOS, Windows, and Linux
# using GitHub-hosted runners (which have the OS toolchains Tauri needs).
#
# Trigger manually from the Actions tab ("Run workflow"), or by pushing a
# tag like v0.1.0. Installers are attached to the run as downloadable
# artifacts; tag builds additionally create a draft GitHub Release.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest        # Apple Silicon (M-series)
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest        # Intel Macs
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: ''
            label: linux-x64
          - platform: windows-latest
            target: ''
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
          # On tag pushes, publish a draft release; otherwise just build.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && 'Ibra OS __VERSION__' || '' }}
          releaseDraft: true
          prerelease: false

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ibra-os-${{ matrix.label }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*-setup.exe
